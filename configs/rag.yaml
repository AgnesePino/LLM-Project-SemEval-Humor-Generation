models_config: "configs/models.yaml"
generation_config: "configs/generation.yaml"
retriever:
  backend: "hf-wikipedia"
  hf_dataset: "not-lain/wikipedia"
  hf_revision: "embedded"
  n_docs: 25000
  embedding_model: "mixedbread-ai/mxbai-embed-large-v1"
  text_column: "text"
  embedding_column: "embeddings"
  query_device: "cpu"
  max_context_chars: 1200
  fallback_backend: "tfidf"
  corpus_path: "data/processed/rag_corpus.jsonl"
  default_k: 5
  allowed_k: [2, 4, 5]
  apply_to: "headline"
selection:
  enabled: true
  num_candidates: 5
  fallback: "greedy"
  reranker:
    type: "llm_judge"  # Alternative: "deberta_reward"
    judge_max_new_tokens: 384
    reward_model_name: null  # Required only for deberta_reward; use a preference-fine-tuned checkpoint.
    device: "auto"
    max_length: 512
    positive_label_index: -1
generation:
  do_sample: true
  temperature: 0.8
  top_p: 0.9
  max_new_tokens: 96
  load_in_4bit: true