models_config: "configs/models.yaml"
base_model: "llama"
preferences_path: "data/final/preferences.jsonl"
output_dir: "checkpoints/llama_dpo_lora"
training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.00005
  num_train_epochs: 1
  max_prompt_length: 512
  max_length: 768
  beta: 0.1
  logging_steps: 5
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
