models_config: "configs/models.yaml"
generation:
  temperature: 0.6
  top_p: 0.9
  max_new_tokens: 60
  repetition_penalty: 1.1
  retries: 2
  load_in_4bit: true
  overwrite: false
validation:
  max_words: 45
  banned_prefixes:
    - "sure"
    - "here is a joke"
    - "here's a joke"
    - "joke:"
    - "answer:"
    - "explanation:"
